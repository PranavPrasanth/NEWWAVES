<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ ONLY ONE viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PWAVES ENTERTAINMENT</title>

  <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <img src="images/pws.jpeg" class="hero-img" alt="Banner">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>PWAVES</h1>
    <p class="tagline">Film Production</p>
    <p class="hero-desc">
      Cinematic experiences, music videos, and impactful ads.
    </p>
  </div>
</section>

<!-- NETFLIX ROW -->
<section class="movies">
  <h2>Projects</h2>

  <div class="netflix-row">

    <div class="netflix-card" onclick="playVideo('https://www.youtube.com/embed/-mdn3oECRVM')">
      <img src="images/FB.jpeg">
      <div class="card-overlay">FILM PROJECT ▶</div>
    </div>

    <div class="netflix-card" onclick="playVideo('https://www.youtube.com/embed/S_YFGUkV2FE')">
      <img src="images/DF.JPEG">
      <div class="card-overlay">MUSIC VIDEO ▶</div>
    </div>

    <div class="netflix-card">
      <img src="images/travel.jpg">
      <div class="card-overlay">COMING SOON</div>
    </div>

  </div>
</section>

<!-- VIDEO MODAL -->
<div id="videoModal" class="video-modal">
  <span class="close-btn" onclick="closeVideo()">×</span>
  <iframe id="videoFrame" src="" allowfullscreen></iframe>
</div>

<!-- ABOUT -->
<section class="about">
  <div class="about-container">

    <div class="about-image">
      <img src="images/pv.jpg">
    </div>

    <div class="about-text">
      <h2>PRANAV PRASHANTH</h2>
      <p>AI Film Director redefining cinema.</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>Contact</h2>

  <form action="https://formspree.io/f/xdaywpvp" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  © 2026 PWAVES ENTERTAINMENT
</footer>

<script>
function playVideo(url) {
  document.getElementById("videoFrame").src = url + "?autoplay=1&rel=0";
  document.getElementById("videoModal").style.display = "flex";
}

function closeVideo() {
  document.getElementById("videoFrame").src = "";
  document.getElementById("videoModal").style.display = "none";
}
</script>

</body>
</html>
